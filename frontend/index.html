<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Student Portal - Demo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 16px; }
    form { margin-bottom: 20px; }
    input { padding: 8px; margin-right: 8px; }
    button { padding: 8px 12px; }
    ul { list-style: none; padding: 0; }
    li { padding: 6px 0; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>
  <h1>Student Portal (Demo)</h1>
  <p>A tiny frontend that consumes the Flask API.</p>
  <form id="createForm">
    <input id="name" placeholder="Name" required />
    <input id="email" placeholder="Email" required />
    <button type="submit">Create</button>
  </form>
  <ul id="list"></ul>

  <script>
    const API = 'http://127.0.0.1:5000';

    async function fetchStudents(){
      try {
        const res = await fetch(API + '/students');
        const data = await res.json();
        const list = document.getElementById('list');
        list.innerHTML = data.map(s => `<li><strong>${s.name}</strong> — ${s.email}</li>`).join('');
      } catch (err) {
        console.error(err);
        document.getElementById('list').innerHTML = '<li>Unable to fetch (is the API running?)</li>';
      }
    }

    document.getElementById('createForm').addEventListener('submit', async e => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      await fetch(API + '/students', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({name, email})
      });
      document.getElementById('name').value = '';
      document.getElementById('email').value = '';
      fetchStudents();
    });

    fetchStudents();
  </script>
</body>
</html>
